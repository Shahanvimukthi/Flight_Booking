<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Airbridge</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Data Manager -->
    <script src="js/data-manager.js"></script>

</head>

<body>

    <a href="index.html" class="back-link">
        <i class="bi bi-arrow-left"></i> Back to Home
    </a>

    <div class="login-page">
        <div class="login-overlay"></div>

        <div class="login-card glass-card p-4 p-md-5 animate-fade-up">
            <div class="text-center mb-4">
                <i class="bi bi-airplane-engines fs-1 text-white mb-2 d-block"></i>
                <h2 class="fw-bold text-white">Welcome Back</h2>
                <p class="text-white-50 small">Access your account to manage flights</p>
            </div>

            <ul class="nav nav-pills nav-fill mb-4 p-1 glass-card rounded-pill" id="pills-tab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active small fw-bold" id="pills-passenger-tab" data-bs-toggle="pill"
                        data-bs-target="#pills-passenger" type="button" role="tab" aria-controls="pills-passenger"
                        aria-selected="true">Passenger</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link small fw-bold" id="pills-admin-tab" data-bs-toggle="pill"
                        data-bs-target="#pills-admin" type="button" role="tab" aria-controls="pills-admin"
                        aria-selected="false">Admin</button>
                </li>
            </ul>

            <div class="tab-content" id="pills-tabContent">
                <!-- Passenger Form -->
                <div class="tab-pane fade show active" id="pills-passenger" role="tabpanel"
                    aria-labelledby="pills-passenger-tab">
                    <form id="passengerLoginForm">
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control bg-transparent text-white border-white-50"
                                id="passengerEmail" placeholder="name@example.com" required>
                            <label for="passengerEmail">Email Address</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control bg-transparent text-white border-white-50"
                                id="passengerPassword" placeholder="Password" required>
                            <label for="passengerPassword">Password</label>
                        </div>
                        <div id="passengerError" class="alert alert-danger d-none py-2 small"></div>
                        <button type="submit" class="btn btn-primary w-100 py-2 rounded-3 fw-bold shadow-lg">
                            Login as Passenger <i class="bi bi-box-arrow-in-right ms-2"></i>
                        </button>
                        <div class="text-center mt-3">
                            <a href="register.html" class="small text-white text-decoration-none hover-white">No
                                account? Register here</a>
                        </div>
                    </form>
                </div>

                <!-- Admin Form -->
                <div class="tab-pane fade" id="pills-admin" role="tabpanel" aria-labelledby="pills-admin-tab">
                    <div class="alert alert-info py-2 small mb-3 border-0 bg-opacity-10 bg-info text-info rounded-3">
                        <i class="bi bi-shield-lock me-2"></i> Restricted Access
                    </div>
                    <form id="adminLoginForm">
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control bg-transparent text-white border-white-50"
                                id="adminEmail" placeholder="admin@airbridge.com" required>
                            <label for="adminEmail">Admin Email</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control bg-transparent text-white border-white-50"
                                id="adminPassword" placeholder="Password" required>
                            <label for="adminPassword">Password</label>
                        </div>
                        <div id="adminError" class="alert alert-danger d-none py-2 small"></div>
                        <button type="submit" class="btn btn-secondary w-100 py-2 rounded-3 fw-bold shadow-lg"
                            style="background-color: var(--secondary-color); border: none;">
                            Login as Admin <i class="bi bi-shield-check ms-2"></i>
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Passenger Login
        document.getElementById('passengerLoginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('passengerEmail').value;
            const password = document.getElementById('passengerPassword').value;
            const errorDiv = document.getElementById('passengerError');
            const btn = this.querySelector('button[type="submit"]');

            errorDiv.classList.add('d-none');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';
            btn.disabled = true;

            const result = await DataManager.loginUser(email, password);

            if (result.success) {
                if (result.user.role === 'admin') {
                    errorDiv.textContent = "Please use the Admin tab login.";
                    errorDiv.classList.remove('d-none');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    return;
                }
                window.location.href = 'index.html';
            } else {
                errorDiv.textContent = result.message;
                errorDiv.classList.remove('d-none');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // Admin Login
        document.getElementById('adminLoginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('adminError');
            const btn = this.querySelector('button[type="submit"]');

            errorDiv.classList.add('d-none');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Verifying...';
            btn.disabled = true;

            const result = await DataManager.loginUser(email, password);

            if (result.success && result.user.role === 'admin') {
                window.location.href = 'admin.html';
            } else {
                errorDiv.textContent = result.success ? "Access Denied: Not an Admin" : result.message;
                errorDiv.classList.remove('d-none');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
