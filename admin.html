<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Airbridge</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Data Manager -->
    <script src="js/data-manager.js"></script>
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-shield-lock-fill me-2 text-warning"></i>Airbridge Admin
            </a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-white-50 small">Logged in as Admin</span>
                <button class="btn btn-sm btn-outline-light rounded-pill px-3" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row">
            <!-- Sidebar / Stats -->
            <div class="col-lg-3 mb-4">
                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-body p-4">
                        <h6 class="text-muted fw-bold text-uppercase small mb-3">Quick Stats</h6>
                        <div class="d-flex align-items-center gap-3 mb-3">
                            <div class="bg-primary bg-opacity-10 text-primary rounded-circle p-3">
                                <i class="bi bi-airplane-engines fs-4"></i>
                            </div>
                            <div>
                                <h4 class="fw-bold mb-0" id="stats-flights">0</h4>
                                <small class="text-muted">Active Flights</small>
                            </div>
                        </div>
                        <div class="d-flex align-items-center gap-3">
                            <div class="bg-success bg-opacity-10 text-success rounded-circle p-3">
                                <i class="bi bi-ticket-perforated fs-4"></i>
                            </div>
                            <div>
                                <h4 class="fw-bold mb-0" id="stats-bookings">0</h4>
                                <small class="text-muted">Total Bookings</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-lg-9">
                <!-- Nav Tabs -->
                <ul class="nav nav-tabs border-bottom-0 mb-3" id="adminTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active border-0 bg-transparent fw-bold" id="flights-tab"
                            data-bs-toggle="tab" data-bs-target="#flights-pane" type="button" role="tab">
                            <i class="bi bi-airplane me-2"></i>Manage Flights
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link border-0 bg-transparent fw-bold" id="bookings-tab" data-bs-toggle="tab"
                            data-bs-target="#bookings-pane" type="button" role="tab">
                            <i class="bi bi-card-checklist me-2"></i>All Bookings
                        </button>
                    </li>
                </ul>

                <div class="tab-content" id="adminTabsContent">
                    <!-- Flights Pane -->
                    <div class="tab-pane fade show active" id="flights-pane" role="tabpanel">
                        <div class="card border-0 shadow-sm rounded-4">
                            <div
                                class="card-header bg-white border-bottom-0 p-4 d-flex justify-content-between align-items-center">
                                <h5 class="fw-bold mb-0">Flight Schedule</h5>
                                <button class="btn btn-primary rounded-pill px-4 btn-sm fw-bold" data-bs-toggle="modal"
                                    data-bs-target="#addFlightModal">
                                    <i class="bi bi-plus-lg me-2"></i>Add Flight
                                </button>
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle mb-0">
                                        <thead class="bg-light">
                                            <tr>
                                                <th class="ps-4">Flight Info</th>
                                                <th>Route</th>
                                                <th>Date</th>
                                                <th>Time</th>
                                                <th>Price</th>
                                                <th class="text-end pe-4">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody id="flight-table-body">
                                            <!-- Injected via JS -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Bookings Pane -->
                    <div class="tab-pane fade" id="bookings-pane" role="tabpanel">
                        <div class="card border-0 shadow-sm rounded-4">
                            <div class="card-header bg-white border-bottom-0 p-4">
                                <h5 class="fw-bold mb-0">Recent Bookings</h5>
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle mb-0">
                                        <thead class="bg-light">
                                            <tr>
                                                <th class="ps-4">Booking ID</th>
                                                <th>Passenger</th>
                                                <th>Flight Details</th>
                                                <th>Date</th>
                                                <th>Status</th>
                                            </tr>
                                        </thead>
                                        <tbody id="booking-table-body">
                                            <!-- Injected via JS -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Flight Modal -->
    <div class="modal fade" id="addFlightModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title fw-bold">Add New Flight</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addFlightForm">
                        <div class="mb-3">
                            <label class="form-label small text-muted">Airline</label>
                            <input type="text" class="form-control" name="airline" required
                                placeholder="e.g. Airbridge Airways">
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label small text-muted">Flight Name</label>
                                <input type="text" class="form-control" name="flightName" required
                                    placeholder="e.g. Morning Express">
                            </div>
                            <div class="col-6">
                                <label class="form-label small text-muted">Flight Type</label>
                                <input type="text" class="form-control" name="flightType" required
                                    placeholder="e.g. Boeing 737">
                            </div>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label small text-muted">From</label>
                                <input type="text" class="form-control" name="from" required placeholder="City (Code)">
                            </div>
                            <div class="col-6">
                                <label class="form-label small text-muted">To</label>
                                <input type="text" class="form-control" name="to" required placeholder="City (Code)">
                            </div>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label small text-muted">Date</label>
                                <input type="date" class="form-control" name="date" required>
                            </div>
                            <div class="col-3">
                                <label class="form-label small text-muted">Dep Time</label>
                                <input type="time" class="form-control" name="depTime" required>
                            </div>
                            <div class="col-3">
                                <label class="form-label small text-muted">Arr Time</label>
                                <input type="time" class="form-control" name="arrTime" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-muted">Price ($)</label>
                            <input type="number" class="form-control" name="price" required min="1">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold">Add
                            Flight</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check Auth
        const currentUser = DataManager.getCurrentUser();
        if (!currentUser || currentUser.role !== 'admin') {
            window.location.href = 'login.html';
        }

        // Render Dashboard
        function renderDashboard() {
            const flights = DataManager.getFlights();
            const bookings = DataManager.getBookings();

            // Stats
            document.getElementById('stats-flights').textContent = flights.length;
            document.getElementById('stats-bookings').textContent = bookings.length;

            // Flights Table
            const flightsTbody = document.getElementById('flight-table-body');
            flightsTbody.innerHTML = flights.map(f => `
                <tr>
                    <td class="ps-4">
                        <div class="fw-bold text-primary">${f.id}</div>
                        <div class="small fw-bold">${f.flightName || ''}</div>
                        <div class="small text-muted">${f.flightType || ''}</div>
                    </td>
                    <td>
                        <div class="d-flex align-items-center">
                            <small class="fw-bold">${f.from}</small> 
                            <i class="bi bi-arrow-right mx-2 text-muted"></i> 
                            <small class="fw-bold">${f.to}</small>
                        </div>
                        <small class="text-muted">${f.airline}</small>
                    </td>
                    <td>${f.date}</td>
                    <td>${f.depTime} - ${f.arrTime}</td>
                    <td class="fw-bold">$${f.price}</td>
                    <td class="text-end pe-4">
                        <button class="btn btn-sm btn-outline-danger rounded-circle p-2" onclick="deleteFlight('${f.id}')">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');

            // Bookings Table
            const bookingsTbody = document.getElementById('booking-table-body');
            bookingsTbody.innerHTML = bookings.length ? bookings.map(b => `
                <tr>
                    <td class="ps-4 text-muted small">${b.id}</td>
                    <td>
                        <div class="fw-bold">${b.userName || 'Guest'}</div>
                        <small class="text-muted">${b.userEmail}</small>
                    </td>
                    <td>
                        <div class="fw-bold">${b.flightNum}</div>
                        <small class="text-muted">${b.from} to ${b.to}</small>
                    </td>
                    <td>${b.flightDate || 'N/A'}</td>
                    <td><span class="badge bg-success bg-opacity-10 text-success rounded-pill px-3">Confirmed</span></td>
                </tr>
            `).join('') : '<tr><td colspan="5" class="text-center py-4 text-muted">No bookings yet</td></tr>';
        }

        // Add Flight
        document.getElementById('addFlightForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = {
                airline: formData.get('airline'),
                flightName: formData.get('flightName'),
                flightType: formData.get('flightType'),
                from: formData.get('from'),
                to: formData.get('to'),
                date: formData.get('date'),
                depTime: formData.get('depTime'),
                arrTime: formData.get('arrTime'),
                price: formData.get('price'),
                duration: '6h 30m' // Mock duration
            };

            DataManager.addFlight(data);

            // Close modal by finding the instance or just hiding
            const modalEl = document.getElementById('addFlightModal');
            const modal = bootstrap.Modal.getInstance(modalEl);
            modal.hide();

            this.reset();
            renderDashboard();
        });

        // Delete Flight
        window.deleteFlight = function (id) {
            if (confirm('Are you sure you want to delete this flight?')) {
                DataManager.deleteFlight(id);
                renderDashboard();
            }
        };

        // Logout
        window.logout = function () {
            DataManager.logoutUser();
            window.location.href = 'index.html';
        };

        // Initial Render
        renderDashboard();
    </script>
</body>

</html>
