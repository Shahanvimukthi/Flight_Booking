<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Airbridge</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Data Manager -->
    <script src="js/data-manager.js"></script>
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top navbar-dark glass-nav">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html"><i
                    class="bi bi-airplane-engines me-2"></i>Airbridge</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-3">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="flights.html">Flights</a></li>
                    <li class="nav-item ms-lg-2"><a class="btn btn-outline-light rounded-pill px-4"
                            href="login.html">Sign In</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5 mt-5">
        <div class="row pt-5">
            <div class="col-12 mb-4 animate-fade-up">
                <h2 class="fw-bold">My Bookings</h2>
                <p class="text-muted">Manage your upcoming and past trips</p>
            </div>

            <div class="col-12 animate-fade-up delay-100">
                <div id="no-bookings" class="text-center py-5 d-none">
                    <div class="bg-white rounded-circle d-inline-flex p-4 shadow-sm mb-3">
                        <i class="bi bi-ticket-perforated fs-1 text-muted"></i>
                    </div>
                    <h5 class="fw-bold text-muted">No bookings found</h5>
                    <p class="text-muted mb-4">You haven't booked any flights yet.</p>
                    <a href="index.html" class="btn btn-primary rounded-pill px-4">Find Flights</a>
                </div>

                <div id="bookings-container" class="row g-4">
                    <!-- Bookings injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script> <!-- Re-use script.js for navbar logic -->

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            // Check Auth
            const currentUser = await DataManager.getCurrentUser();
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }

            // Load Bookings
            const bookings = await DataManager.getUserBookings(currentUser.email);
            const container = document.getElementById('bookings-container');
            const noBookings = document.getElementById('no-bookings');

            if (bookings.length === 0) {
                noBookings.classList.remove('d-none');
            } else {
                container.innerHTML = bookings.map((b, i) => `
                    <div class="col-lg-6">
                        <div class="card border-0 shadow-sm rounded-4 overflow-hidden h-100">
                            <div class="card-header bg-primary bg-opacity-10 border-0 p-3 d-flex justify-content-between align-items-center">
                                <span class="badge bg-primary rounded-pill">Confirmed</span>
                                <small class="text-muted fw-bold">ID: ${b.id}</small>
                            </div>
                            <div class="card-body p-4">
                                <h5 class="fw-bold mb-3">${b.airline}</h5>
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <div>
                                        <h3 class="fw-bold text-primary mb-0">${b.from.split(' ')[0]}</h3>
                                        <small class="text-muted">${b.from.replace(b.from.split(' ')[0], '')}</small>
                                    </div>
                                    <div class="text-center px-3">
                                        <i class="bi bi-airplane text-muted small" style="transform: rotate(90deg);"></i>
                                        <hr class="my-1 border-primary" style="width: 50px;">
                                    </div>
                                    <div class="text-end">
                                        <h3 class="fw-bold text-primary mb-0">${b.to.split(' ')[0]}</h3>
                                        <small class="text-muted">${b.to.replace(b.to.split(' ')[0], '')}</small>
                                    </div>
                                </div>
                                <div class="row g-3">
                                    <div class="col-6">
                                        <small class="text-muted d-block">Date</small>
                                        <span class="fw-bold text-dark">${b.flightDate || 'N/A'}</span>
                                    </div>
                                    <div class="col-6">
                                        <small class="text-muted d-block">Price</small>
                                        <span class="fw-bold text-dark">$${b.price}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="card-footer bg-white border-top border-light p-3 text-center">
                                <button class="btn btn-outline-primary btn-sm rounded-pill w-100">View E-Ticket</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        });
    </script>
</body>

</html>
