<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Airbridge</title>
    <!-- Icon Image -->
    <link rel="icon" href="">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Data Manager -->
    <script src="js/data-manager.js"></script>
</head>

<body>

    <a href="index.html" class="back-link">
        <i class="bi bi-arrow-left"></i> Back to Home
    </a>

    <div class="login-page">
        <div class="login-overlay"></div>

        <div class="login-card glass-card p-4 p-md-5 animate-fade-up">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus fs-1 text-white mb-2 d-block"></i>
                <h2 class="fw-bold text-white">Create Account</h2>
                <p class="text-white-50 small">Join Airbridge specifically for premium travel</p>
            </div>

            <form id="registerForm">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control bg-transparent text-white border-white-50" id="regName"
                        placeholder="Full Name" required>
                    <label for="regName">Full Name</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="email" class="form-control bg-transparent text-white border-white-50" id="regEmail"
                        placeholder="name@example.com" required>
                    <label for="regEmail">Email Address</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control bg-transparent text-white border-white-50"
                        id="regPassword" placeholder="Password" required>
                    <label for="regPassword">Password</label>
                </div>

                <div id="registerError" class="alert alert-danger d-none py-2 small"></div>

                <button type="submit" class="btn btn-primary w-100 py-2 rounded-3 fw-bold shadow-lg">
                    Register <i class="bi bi-arrow-right ms-2"></i>
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="text-white-50 small mb-0">Already have an account? <a href="login.html"
                        class="text-white fw-bold text-decoration-none hover-white">Sign In</a></p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const errorDiv = document.getElementById('registerError');

            errorDiv.classList.add('d-none');

            const result = await DataManager.registerUser(name, email, password);

            if (result.success) {
                await DataManager.loginUser(email, password);
                alert('Registration successful! Redirecting...');
                window.location.href = 'index.html';
            } else {
                errorDiv.textContent = result.message;
                errorDiv.classList.remove('d-none');
            }
        });
    </script>
</body>

</html>
